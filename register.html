<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Alfas Step</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#0f172a',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen flex items-center justify-center px-4 py-12">

    <div id="navbar"></div>
    
    <div class="max-w-md w-full bg-white dark:bg-gray-900 rounded-[2.5rem] shadow-2xl p-8 md:p-10 border border-slate-100 dark:border-slate-800">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tighter uppercase">Daftar Akun</h1>
            <p class="text-slate-500 dark:text-gray-400 mt-2 text-sm">Bergabunglah dengan komunitas Alfas Step</p>
        </div>

        <div id="alert" class="hidden mb-6 p-4 rounded-2xl text-sm font-bold text-center"></div>

        <form id="register-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Nama Lengkap</label>
                <input type="text" id="reg-name" placeholder="Masukkan nama Anda" 
                    class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all dark:text-white" required>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Email</label>
                <input type="email" id="reg-email" placeholder="contoh@email.com" 
                    class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all dark:text-white" required>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Password</label>
                <input type="password" id="reg-password" placeholder="Min. 6 karakter" 
                    class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all dark:text-white" required>
            </div>

            <button type="submit" class="w-full bg-slate-900 dark:bg-indigo-600 text-white py-4 rounded-2xl font-bold tracking-wide hover:bg-slate-800 dark:hover:bg-indigo-700 transition-all shadow-lg active:scale-95">
                BUAT AKUN SEKARANG
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
            <p class="text-sm text-slate-500 dark:text-gray-400">
                Sudah punya akun? 
                <a href="login.html" class="text-indigo-600 dark:text-indigo-400 font-bold hover:underline">Masuk di sini</a>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const registerForm = document.getElementById('register-form');
        const alertBox = document.getElementById('alert');

        function showAlert(msg, isError = true) {
            alertBox.innerText = msg;
            alertBox.className = `mb-6 p-4 rounded-2xl text-sm font-bold text-center ${isError ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
            alertBox.classList.remove('hidden');
        }

        registerForm.onsubmit = (e) => {
            e.preventDefault();
            
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            // Memanggil fungsi register dari Auth (js/auth.js)
            const result = Auth.register(name, email, password);

            if (result.success) {
                showAlert("Pendaftaran Berhasil! Mengalihkan...", false);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                showAlert(result.msg);
            }
        };
    </script>
</body>
</html>

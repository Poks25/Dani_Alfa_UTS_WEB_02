<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Alfas Step</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div id="navbar"></div>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            
            <section class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
                <h2 class="text-2xl font-black mb-6 dark:text-white uppercase tracking-tighter">Data Pengiriman</h2>
                <form id="checkout-form" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Nama Lengkap</label>
                        <input type="text" id="cust-name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Masukkan nama penerima">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Nomor WhatsApp</label>
                        <input type="tel" id="cust-phone" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Contoh: 08123456789">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Alamat Lengkap</label>
                        <textarea id="cust-address" required rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Nama jalan, nomor rumah, RT/RW, Kecamatan"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 dark:bg-indigo-600 text-white py-4 rounded-2xl font-black hover:opacity-90 transition shadow-lg uppercase tracking-widest">Konfirmasi Pesanan</button>
                </form>
            </section>

            <section class="bg-slate-100 dark:bg-slate-800/50 p-8 rounded-3xl h-fit">
                <h2 class="text-xl font-black mb-6 dark:text-white uppercase tracking-tighter">Ringkasan Pesanan</h2>
                <div id="checkout-summary" class="space-y-4 mb-6">
                    </div>
                <div class="border-t border-slate-200 dark:border-slate-700 pt-6">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500 dark:text-slate-400 font-bold uppercase text-xs">Total Pembayaran</span>
                        <span id="checkout-total" class="text-2xl font-black text-slate-900 dark:text-white">Rp 0</span>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>

    <script>
        // Fungsi Inisialisasi Tampilan Checkout
        function initCheckout() {
            const items = Cart.get();
            const summary = document.getElementById('checkout-summary');
            const totalDisplay = document.getElementById('checkout-total');

            if (!items || items.length === 0) {
                alert("Keranjang kosong, silakan pilih produk terlebih dahulu.");
                window.location.href = 'index.html';
                return;
            }

            let total = 0;
            summary.innerHTML = items.map(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                return `
                    <div class="flex justify-between items-center text-sm">
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-800 dark:text-slate-200">${item.name}</span>
                            <span class="text-xs text-slate-500">${item.qty} x Rp ${item.price.toLocaleString('id-ID')}</span>
                        </div>
                        <span class="font-black dark:text-white text-right">Rp ${subtotal.toLocaleString('id-ID')}</span>
                    </div>
                `;
            }).join('');

            totalDisplay.innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }

        // Event Listener untuk Submit Form
        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const items = Cart.get();
            if (items.length === 0) return;

            const orderData = {
                id: 'INV-' + Date.now(), // ID unik berdasarkan timestamp
                date: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }),
                customer: {
                    name: document.getElementById('cust-name').value,
                    phone: document.getElementById('cust-phone').value,
                    address: document.getElementById('cust-address').value
                },
                items: items,
                total: items.reduce((acc, i) => acc + (i.price * i.qty), 0),
                status: 'Diproses' // Status awal pesanan
            };

            // Ambil riwayat lama, masukkan pesanan baru di urutan teratas (unshift)
            const history = JSON.parse(localStorage.getItem('orders') || '[]');
            history.unshift(orderData); 
            localStorage.setItem('orders', JSON.stringify(history));

            // Bersihkan keranjang belanja
            localStorage.removeItem('cart'); 

            // Notifikasi dan redirect ke halaman Riwayat
            alert('Terima kasih! Pesanan Anda berhasil dikonfirmasi.');
            window.location.href = 'order-history.html';
        });

        // Jalankan init saat halaman dimuat
        document.addEventListener('DOMContentLoaded', initCheckout);
    </script>
</body>
</html>

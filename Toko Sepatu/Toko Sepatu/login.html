<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><title>Masuk - Alfas Step</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<div id="navbar"></div>

<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-black text-center mb-6">MASUK</h2>
        <form id="login-form" class="space-y-4">
            <input type="email" id="email" placeholder="Email" class="w-full p-4 border rounded-xl" required>
            <input type="password" id="password" placeholder="Password" class="w-full p-4 border rounded-xl" required>
            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">LOGIN</button>
        </form>
        <p class="text-center mt-4 text-sm">Belum punya akun? <a href="register.html" class="text-indigo-600 font-bold">Daftar</a></p>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            if(Auth.login(document.getElementById('email').value, document.getElementById('password').value)) {
                window.location.href = 'index.html';
            } else { alert("Email atau Password salah!"); }
        };
    </script>
</body>
</html>

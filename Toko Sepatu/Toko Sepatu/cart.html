<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Keranjang - Alfas Step</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div id="navbar"></div>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-black mb-8 text-slate-900 dark:text-white uppercase tracking-tighter">KERANJANG BELANJA</h1>
        
        <div id="cart-list" class="space-y-4 bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
        </div>

        <div class="mt-8 flex flex-col md:flex-row justify-between items-center gap-6 p-8 bg-slate-900 dark:bg-indigo-900 text-white rounded-3xl shadow-xl">
            <div>
                <p class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-1">Estimasi Total Pembayaran</p>
                <span class="text-3xl font-black text-white" id="total-price">Rp 0</span>
            </div>
            <a href="checkout.html" class="w-full md:w-auto bg-white text-slate-900 px-12 py-4 rounded-2xl font-black text-center hover:bg-slate-200 transition shadow-lg">CHECKOUT SEKARANG</a>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>

    <script>
        // Fungsi untuk memperbarui jumlah di LocalStorage
        function updateQty(id, delta) {
            let items = Cart.get();
            const index = items.findIndex(item => item.id === id);
            
            if (index !== -1) {
                items[index].qty += delta;
                
                // Jika qty menjadi 0, hapus item dari keranjang
                if (items[index].qty < 1) {
                    items.splice(index, 1);
                }
                
                // Simpan kembali ke LocalStorage (Pastikan Cart.save ada atau gunakan localStorage langsung)
                localStorage.setItem('cart', JSON.stringify(items));
                renderCart(); // Render ulang tampilan
            }
        }

        function renderCart() {
            const items = Cart.get(); 
            const list = document.getElementById('cart-list');
            const totalElement = document.getElementById('total-price');

            if (!items || items.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-slate-400 font-bold">Keranjang Anda masih kosong.</p>
                        <a href="index.html" class="text-indigo-600 font-bold mt-4 inline-block hover:underline">Mulai Belanja</a>
                    </div>`;
                totalElement.innerText = "Rp 0";
                return;
            }

            list.innerHTML = items.map(item => `
                <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-slate-50 dark:border-slate-800 pb-6 mb-6 last:border-0 last:mb-0 last:pb-0 gap-4">
                    <div class="flex items-center gap-5">
                        <img src="${item.image}" class="w-24 h-24 rounded-2xl object-cover shadow-sm" alt="${item.name}">
                        <div>
                            <h4 class="font-extrabold text-slate-900 dark:text-white text-lg leading-tight">${item.name}</h4>
                            <p class="text-xs text-indigo-600 font-bold mt-1">Rp ${item.price.toLocaleString('id-ID')}</p>
                            
                            <div class="flex items-center gap-3 mt-3 bg-slate-100 dark:bg-slate-800 w-fit rounded-lg p-1">
                                <button onclick="updateQty('${item.id}', -1)" class="w-8 h-8 flex items-center justify-center bg-white dark:bg-slate-700 rounded-md shadow-sm font-bold hover:bg-red-50 hover:text-red-600 transition">-</button>
                                <span class="font-black text-slate-900 dark:text-white px-2">${item.qty}</span>
                                <button onclick="updateQty('${item.id}', 1)" class="w-8 h-8 flex items-center justify-center bg-white dark:bg-slate-700 rounded-md shadow-sm font-bold hover:bg-green-50 hover:text-green-600 transition">+</button>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-slate-400 font-bold uppercase tracking-tighter mb-1">Subtotal</p>
                        <p class="font-black text-slate-900 dark:text-white text-xl">Rp ${(item.price * item.qty).toLocaleString('id-ID')}</p>
                    </div>
                </div>
            `).join('');

            const total = items.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);
            
            if (totalElement) {
                totalElement.innerText = `Rp ${total.toLocaleString('id-ID')}`;
            }
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>

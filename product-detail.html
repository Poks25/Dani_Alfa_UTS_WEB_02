<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><title>Detail Produk - Alfas Step</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<div id="navbar"></div>

<body class="bg-white">
    <div id="navbar"></div>
    <main class="max-w-6xl mx-auto px-4 py-12 grid md:grid-cols-2 gap-12" id="detail-container">
        </main>
    <script src="js/auth.js"></script><script src="js/ui.js"></script><script src="js/cart.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        fetch('data/products.json').then(res => res.json()).then(products => {
            const p = products.find(item => item.id === productId);
            if(p) {
                document.getElementById('detail-container').innerHTML = `
                    <img src="${p.image}" class="rounded-3xl w-full object-cover h-[500px]">
                    <div>
                        <span class="text-indigo-600 font-bold uppercase tracking-widest text-sm">${p.category}</span>
                        <h1 class="text-4xl font-black mt-2 mb-4">${p.name}</h1>
                        <p class="text-2xl font-bold text-slate-900 mb-6">Rp ${p.price.toLocaleString('id-ID')}</p>
                        <p class="text-slate-500 mb-8 leading-relaxed">Sepatu premium dengan kualitas ekspor, dirancang khusus untuk kenyamanan Dhani Alfa's Customer.</p>
                        <button onclick='Cart.add(${JSON.stringify(p)})' class="bg-slate-900 text-white px-12 py-4 rounded-2xl font-bold">TAMBAH KE KERANJANG</button>
                    </div>`;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Riwayat Pesanan - Alfas Step</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div id="navbar"></div>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-black text-slate-900 dark:text-white uppercase tracking-tighter">Riwayat Pesanan</h1>
                <p class="text-slate-500 dark:text-slate-400 font-medium">Pantau status pengiriman produk Alfas Step Anda.</p>
            </div>
            <a href="index.html" class="text-indigo-600 font-bold hover:underline">Kembali Belanja</a>
        </div>
        
        <div id="order-list" class="space-y-6">
            </div>
    </main>

    <script src="js/ui.js"></script> <script>
        function renderOrderHistory() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const list = document.getElementById('order-list');

            if (orders.length === 0) {
                list.innerHTML = `
                    <div class="bg-white dark:bg-slate-900 p-12 rounded-3xl text-center border border-dashed border-slate-200 dark:border-slate-800">
                        <p class="text-slate-400 font-bold">Belum ada riwayat pesanan.</p>
                    </div>`;
                return;
            }

            list.innerHTML = orders.map(order => `
                <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden">
                    <div class="bg-slate-50 dark:bg-slate-800/50 px-6 py-4 flex justify-between items-center border-b border-slate-100 dark:border-slate-800">
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">ID Pesanan</p>
                            <p class="font-black text-slate-900 dark:text-white">${order.id}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Tanggal</p>
                            <p class="font-bold text-slate-700 dark:text-slate-300">${order.date}</p>
                        </div>
                    </div>

                    <div class="p-6 space-y-4">
                        ${order.items.map(item => `
                            <div class="flex items-center gap-4">
                                <img src="${item.image}" class="w-16 h-16 rounded-xl object-cover">
                                <div class="flex-1">
                                    <h4 class="font-bold text-slate-900 dark:text-white">${item.name}</h4>
                                    <p class="text-sm text-slate-500">${item.qty} x Rp ${item.price.toLocaleString('id-ID')}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="px-6 py-4 bg-slate-900 dark:bg-indigo-900 flex justify-between items-center">
                        <div>
                            <span class="text-indigo-300 text-xs font-bold uppercase tracking-widest">Status:</span>
                            <span class="ml-2 bg-green-500 text-white text-[10px] px-2 py-1 rounded-full font-black uppercase">${order.status}</span>
                        </div>
                        <p class="text-xl font-black text-white">Rp ${order.total.toLocaleString('id-ID')}</p>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderOrderHistory);
    </script>
</body>
</html>
